<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema Seguro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">


    <div id="login" class="card">
      <h2>Entrar</h2>
      <form onsubmit="loginTeste(event)">
        <input type="email" placeholder="E-mail" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit">Login</button>
      </form>
      <p>Não tem conta? <a href="#" onclick="mostrarCadastro()">Cadastrar</a></p>
    </div>


    <div id="cadastro" class="card hidden">
      <h2>Criar Conta</h2>
      <form onsubmit="cadastrarUsuario(event)">
        <input type="email" placeholder="E-mail" required>
        
        <input type="password" placeholder="Senha" required>
        <input type="password" placeholder="Confirmar Senha" required>
        <button type="submit">Cadastrar</button>
      </form>
      <p><a href="#" onclick="mostrarLogin()">Voltar</a></p>
    </div>

  </div>

    <div id="sistema" class="card hidden">
    <h2>Cadastro de Refugiados</h2>

    
    <form id="formRefugiado">

        <input type="text" id="nomeRef" placeholder="Nome" required>
        <input type="text" id="enderecoRef" placeholder="Endereço" required>
        <input type="number" id="idadeRef" placeholder="Idade" min="0" required>

        <select id="religiaoRef" required>
        <option value="">Religião</option>
        <option>Muçulmano</option>
        <option>Judeu</option>
        <option>Católico</option>
        </select>

        <select id="ideologiaRef" required>
        <option value="">Ideologia Política</option>
        <option>Esquerda</option>
        <option>Direita</option>
        <option>Centro</option>
        </select>

        <input type="text" id="profissaoRef" placeholder="Profissão">
        <input type="number" id="filhosRef" placeholder="Número de Filhos" min="0">
        <input type="number" id="rendaRef" placeholder="Renda Familiar antes da guerra" min="0" step="0.01">
        <input type="text" id="escolaridadeRef" placeholder="Maior grau de Formação Escolar.">

        <button type="submit">Salvar</button>
    </form>

    
    
    <button onclick="abrirLista()">Ver todos os refugiados cadastrados</button>


    <button onclick="logout()">Sair</button>
    </div>

    <div id="modalLista" class="modal hidden">
  <div class="modal-content">
    <h3>Refugiados Cadastrados</h3>

    <div id="listaContainer">
      <ul id="listaRefugiados"></ul>
    </div>

    <button onclick="fecharLista()">Fechar</button>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
