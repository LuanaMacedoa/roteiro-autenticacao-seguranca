<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema Seguro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">


    <div id="login" class="card">
      <h2>Entrar</h2>
      <form>
        <input type="email" placeholder="E-mail" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit">Login</button>
      </form>
      <p>Não tem conta? <a href="#" onclick="mostrarCadastro()">Cadastrar</a></p>
    </div>


    <div id="cadastro" class="card hidden">
      <h2>Criar Conta</h2>
      <form>
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" placeholder="Endereço" required>
        <input type="number" placeholder="Idade" min="0" required>
        <input type="email" placeholder="E-mail" required>
        
        <select required>
            <option value="">Religião</option>
            <option>Muçulmano</option>
            <option>Judeu</option>
            <option>Católico</option>
        </select>

        <select required>
            <option value="">Ideologia Política</option>
            <option>Esquerda</option>
            <option>Direita</option>
            <option>Centro</option>
        </select>

        <input type="text" placeholder="Profissão">
        <input type="number" placeholder="Número de Filhos" min="0">
        <input type="number" placeholder="Renda Familiar antes da guerra" min="0" step="0.01">
        <input type="text" placeholder="Maior grau de Formação Escolar">
        <input type="password" placeholder="Senha" required>
        <input type="password" placeholder="Confirmar Senha" required>
        <button type="submit">Cadastrar</button>
      </form>
      <p><a href="#" onclick="mostrarLogin()">Voltar</a></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
